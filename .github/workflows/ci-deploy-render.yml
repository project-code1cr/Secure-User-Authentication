# name: Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Trigger Render deploy
        if: env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != ''
        run: |
          echo "Triggering deploy for Render service $RENDER_SERVICE_ID"
          curl -X POST https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":true}'
      - name: Fail if Render secrets missing
        if: env.RENDER_API_KEY == '' || env.RENDER_SERVICE_ID == ''
        run: |
          echo "Render secrets are not configured in this repository. Add RENDER_API_KEY and RENDER_SERVICE_ID to GitHub secrets." >&2
          exit 1